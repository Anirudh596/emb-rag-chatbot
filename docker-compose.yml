version: "3.9"

services:
  backend:
    build: ./backend
    container_name: emb-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app/data:/app/app/data
    networks:
      - emb-net

  frontend:
    build: ./frontend
    container_name: emb-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - emb-net

networks:
  emb-net:
    driver: bridge